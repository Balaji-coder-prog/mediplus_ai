{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="brand-logo">🛡️</div>
            <h2>Secure Registration</h2>
            <p>Join the future of smart healthcare</p>
        </div>

        <form method="POST" class="auth-form" action="{{ url_for('auth.register') }}">
            
            <div class="input-group">
                <label for="username">Full Name</label>
                <input type="text" id="username" name="username" placeholder="e.g. Balaji Raj" required autocomplete="name">
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required autocomplete="email">
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label for="role">Account Type</label>
                    <select name="role" id="role" required>
                        <option value="patient" selected>Patient</option>
                        <option value="doctor">Doctor / Specialist</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                </div>
            </div>

            <div class="input-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn-submit">Create Secure Account</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
